<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* The specificity of the selector is 1 */
        h1 {

            color: aqua;

        }

        /* The specificity of the selector is 10 */
        .cred {
            color: pink;

        }

        /* The specificity of the selector is 1 + 10 = 11*/
        h1.yellow {
            color: green;
        }

        /* The specificity of the selector is 10 */
        .cpurple {
            color: blue;
        }

        /* This is a example of attribute selctor. The specificity of the selector is 10*/
        [data-x=a] {
            color: maroon;
        }

        /* The specificity of the selector is 1+10+10+10+10 = 40 */
        a.harryclass.rohan-class[herf]:hover {
            color: blueviolet;
        }
    </style>
</head>

<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
</body>

</html>
