<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Grid</title>
    <style>
        .container {
            border: 2px solid black;
            width: 80vw;
            height: 100vh;
            display: grid;
            grid-template-columns: [pehla] 120px [doosra] 100px [t];
            grid-template-rows: 100px 100px 100px;
            /* grid-template-columns: repeat(2, minmax(100px, 2fr)); */
            /* grid-template-columns: repeat(3, 80px); */
            /* grid-template-rows: repeat(2, 80px); */
            /* gap: 34px; */
            /* row-gap: 34px;
            column-gap: 34px; */
            /* justify-content: center; */
            /* align-items: center; */
        }

        .item-4 {
            grid-row: 1/2;
            grid-column: pehla/t;

        }


        .item {
            border: 2px solid black;
            height: 55px;
            width: 55px;
        }



        .item-1 {
            grid-row: 1/2;
            /* or you can do  */
            /* grid-row-start: 1;
            grid-row-end: 2; */

            /* same thing */
            grid-column: 1/2;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
        <div class="item"></div>
    </div>
</body>

</html>
