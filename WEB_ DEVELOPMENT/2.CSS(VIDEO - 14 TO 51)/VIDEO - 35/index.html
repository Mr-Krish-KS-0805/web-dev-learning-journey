<html lang="en">

        /* .box:nth-child(odd){

        /* .box:nth-last-child(2){

        .boxes::before {
            content: "Krish is good";
            color: brown;
        }

        .boxes::after {
            content: "Sigma course is also good";
        }

        ::selection {
            background-color: black;
            color: white;
        }

        .box::first-letter {
            color: peru;
            font-size: 25px;
        }

        input::placeholder {
            color: blue;
        }
    </style>
</head>

<body>
    <div class="boxes">
        <div data-color="primary" class="box">I am first box</div>
        <div class="box">I am second box</div>
        <div class="box">I am second box</div>
        <input type="text" placeholder="Enter your text here">
    </div>
</body>
