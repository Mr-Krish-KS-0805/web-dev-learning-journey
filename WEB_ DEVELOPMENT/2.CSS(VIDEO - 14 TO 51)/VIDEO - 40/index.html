<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
        }

        header {
            position: sticky;
            top: 0;
        }

        nav {
            background-color: rgb(185, 13, 139);
            height: 75px;
        }

        main {
            color: white;

        }


        .container {
            background-color: green;
            margin: 50px 60px;
            padding: 50px 35px;
            text-align: center;

        }

        .box1 {
            background-color: palevioletred;
            height: 70vh;
            width: 40%;
            margin: 0 40px;
            display: inline-block;
        }

        .box2 {
            background-color: blue;
            height: 70vh;
            width: 40%;
            margin: 0 40px;
            display: inline-block;
        }

        .text-box {
            border: 2px solid white;
            border-radius: 45px;
            margin: 45px 10vw;
            font-size: 4em;
            padding: 15px;
            text-align: center;

        }

        .orange-box {
            background-color: orange;
            border: 2px solid gold;
            border-radius: 40px;
            height: 55px;
            width: 55px;
            position: fixed;
            bottom: 275px;
            right: 89px;
        }

        footer {
            height: 90px;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>

        <div class="text-box">
            <p>Welcome to this Sigma Web Development Express</p>
        </div>

        <div class="orange-box">

        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
