<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img width="400" height=" 200" src="image.png" alt="Train image">
    <br>
    <table>
        <caption>Employee Details</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Favourite language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Krish</td>
                <td>Programmer</td>
                <td>Python</td>
            </tr>
            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">Java</td>
            </tr>
            <tr>
                <td colspan="2">Sam</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">Foot</td>
            </tr>
        </tfoot>
    </table>

    <ul>
        <li>Krish</li>
        <li>Prorgrammer</li>
        <li>Pyhton</li>
    </ul> 

    <ul type="square">
        <li>Krish</li>
        <li>Prorgrammer</li>
        <li>Pyhton</li>
    </ul>

    <ol type="A">
        <li>Krish</li>
        <li>Programmer</li>
        <li>Python</li>
    </ol> 

    <ol>
        <li>Krish</li>
        <li>Programmer</li>
        <li>Python</li>
    </ol>
</body>

</html>
