<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM lets learn it</title>
</head>

<body>
    <h1>Form to apply for sigma web development</h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>

        <div>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">female</label>
        </div>
        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">subscribe to get information</label>
        </div>
        <div>
            <label for="coment">Enter your comment</label>
            <br>
            <textarea name="commnet" id="comment" rows="4" cols="50"></textarea>
        </div>
        <div>
            <select name="fruits">
                <option value="Apple">Apple</option>
                <option value="Mango">Mango</option>
                <option value="Banana">Banana</option>
            </select>
        </div>
    </form>
</body>
</html>
